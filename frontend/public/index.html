<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a73e8" />
    <title>Google Cloud Device Trust Gateway</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --google-blue: #1a73e8;
        --google-blue-hover: #174ea6;
        --google-green: #137333;
        --google-green-bg: #e6f4ea;
        --google-red: #d93025;
        --google-red-hover: #a50e0e;
        --google-grey-bg: #f8f9fa;
        --google-text-primary: #202124;
        --google-text-secondary: #5f6368;
        --google-border: #dadce0;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: 'Google Sans', 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #f8f9fa;
        color: #202124;
      }
      /* WCAG 2.1 AA Compliant Keyboard Focus Rings (Criterion 2.4.7 Focus Visible) */
      a:focus-visible,
      button:focus-visible,
      input:focus-visible,
      select:focus-visible,
      [tabindex]:focus-visible {
        outline: 3px solid #1a73e8 !important;
        outline-offset: 2px !important;
      }
      button {
        font-family: 'Google Sans', 'Roboto', sans-serif;
        transition: background-color 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
      }
      button:hover:not(:disabled) {
        filter: brightness(0.95);
      }
      table th {
        font-family: 'Google Sans', sans-serif;
        font-weight: 500;
        letter-spacing: 0.2px;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
